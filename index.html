<!DOCTYPE html>
<html>
<head>
<title>Farmer Login</title>

<style>
body{
    font-family: Arial;
    background:#e8f5e9;
}

.container{
    width:350px;
    margin:100px auto;
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
    color:green;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
}

button:hover{
    background:darkgreen;
}

p{
    text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h2>Farmer Login</h2>

<form>

<input type="text" placeholder="Phone Number" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

<p>New user? <a href="register.html">Register</a></p>

</form>

</div>

</body>
</html>
