<!DOCTYPE html>
<html>
<head>
<title>Buyer Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#43e97b,#38f9d7);
}

/* Login Card */

.container{
background:white;
padding:30px;
width:350px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
color:#2e7d32;
margin-bottom:20px;
}

/* Inputs */

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
transition:0.3s;
}

input:focus{
border-color:#2e7d32;
outline:none;
box-shadow:0 0 5px rgba(46,125,50,0.4);
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1b5e20;
}

</style>
</head>

<body>

<div class="container">

<h2>Buyer Login</h2>

<form onsubmit="loginUser(event)">

<input type="text" id="name" placeholder="Buyer Name" required>

<input type="text" id="phone" placeholder="Phone Number" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

<script>

function loginUser(event){

event.preventDefault();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

/* Save buyer details */

localStorage.setItem("buyerName",name);
localStorage.setItem("buyerPhone",phone);

/* Go to market page */

window.location.href="market.html";

}

</script>

</body>
</html>
