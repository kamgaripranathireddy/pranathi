<!DOCTYPE html>
<html>
<head>
<title>Farmers Crop Market</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#56ab2f,#a8e063);
}

/* Main Box */

.container{
background:white;
padding:40px;
border-radius:15px;
text-align:center;
width:420px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
color:#2e7d32;
margin-bottom:10px;
}

p{
color:#555;
margin-bottom:30px;
}

/* Buttons */

.btn{
display:block;
width:100%;
padding:14px;
margin:12px 0;
text-decoration:none;
color:white;
font-size:16px;
border-radius:8px;
font-weight:bold;
transition:0.3s;
}

.farmer{
background:#2e7d32;
}

.buyer{
background:#1976d2;
}

.market{
background:#ff9800;
}

.btn:hover{
transform:scale(1.05);
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>Farmers Crop Market</h1>

<p>Sell crops directly to buyers without middlemen</p>

<a href="farmer_regis.html" class="btn farmer">
Farmer Registration
</a>

<a href="buyer_register.html" class="btn buyer">
Buyer Registration
</a>

</a>

</div>

</body>
</html>
