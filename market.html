<!DOCTYPE html>
<html>
<head>
<title>Daily Market Price Updates</title>

<style>

body{
font-family: Arial;
background:#f0f8f0;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:70%;
background:white;
}

th, td{
padding:10px;
border:1px solid black;
}

th{
background:green;
color:white;
}

button{
padding:8px 15px;
background:green;
color:white;
border:none;
cursor:pointer;
}

.cartBtn{
position:absolute;
right:20px;
top:20px;
background:#2e7d32;
}

</style>

</head>

<body>

<h2>🌾 Daily Crop Market Prices</h2>

<!-- CART BUTTON -->
<button class="cartBtn" onclick="goToCart()">🛒 View Cart</button>

<button onclick="getPrices()">Load Today's Prices</button>

<br><br>

<table id="priceTable">

<tr>
<th>Crop</th>
<th>Market</th>
<th>Min Price</th>
<th>Max Price</th>
<th>Cart</th>
</tr>

</table>

<script>

function getPrices(){

let api = "https://api.data.gov.in/resource/9ef84268-d588-465a-a308-a864a43d0070?api-key=579b464db66ec23bdd00000161db0b48a34b45bb65850ca7e120fed0&format=json&limit=10";

fetch(api)

.then(response => response.json())

.then(data => {

let table = document.getElementById("priceTable");

table.innerHTML = `
<tr>
<th>Crop</th>
<th>Market</th>
<th>Min Price</th>
<th>Max Price</th>
<th>Cart</th>
</tr>
`;

data.records.forEach(item => {

let row = table.insertRow();

row.insertCell(0).innerHTML = item.commodity;
row.insertCell(1).innerHTML = item.market;
row.insertCell(2).innerHTML = "₹" + item.min_price;
row.insertCell(3).innerHTML = "₹" + item.max_price;

let cartBtn = document.createElement("button");
cartBtn.innerText="Add";

cartBtn.onclick=function(){
addToCart(item.commodity,item.max_price);
};

row.insertCell(4).appendChild(cartBtn);

});

});

}

/* Add to cart */

function addToCart(name,price){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name:name,
price:price
});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to Cart");

}

/* Go to cart page */

function goToCart(){

window.location.href="cart.html";

}

</script>

</body>
</html>
