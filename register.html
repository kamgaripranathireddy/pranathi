<!DOCTYPE html>
<html>
<head>
<title>Farmer Registration</title>

<style>
body{
    font-family: Arial;
    background:#e8f5e9;
}

.container{
    width:350px;
    margin:80px auto;
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
    color:green;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0 15px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
}

button:hover{
    background:darkgreen;
}

p{
    text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h2>Farmer Registration</h2>

<form>

<label>Name</label>
<input type="text" placeholder="Enter Name" required>

<label>Email</label>
<input type="email" placeholder="Enter Email" required>

<label>Phone</label>
<input type="text" placeholder="Enter Phone Number" required>

<label>Password</label>
<input type="password" placeholder="Enter Password" required>

<label>Crop Type</label>
<input type="text" placeholder="Example: Rice, Tomato">

<button type="submit">Register</button>

<p>Already have account? <a href="login.html">Login</a></p>

</form>

</div>

</body>
</html>
